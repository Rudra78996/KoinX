version: '3.8'

services:
  app:
    build: .
    container_name: reconciliation_app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/reconciliation_db
      - TIMESTAMP_TOLERANCE_SECONDS=300
      - QUANTITY_TOLERANCE_PCT=0.01
      - PROXIMITY_WINDOW_SECONDS=3600
    depends_on:
      - mongodb
    restart: always

  mongodb:
    image: mongo:6.0
    container_name: reconciliation_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data:
